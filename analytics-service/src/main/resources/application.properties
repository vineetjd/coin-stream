spring.application.name=analytics-service
server.port=8085
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.streams.application-id=coinstream-analytics
spring.kafka.streams.properties.default.key.serde=org.apache.kafka.common.serialization.Serdes$StringSerde
spring.kafka.streams.properties.default.value.serde=org.springframework.kafka.support.serializer.JsonSerde

# Helper to trust packages for JSON Serde
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.streams.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.streams.properties.spring.json.use.type.headers=false

# Dev/Test optimization: Disable caching to see results immediately
spring.kafka.streams.properties.cache.max.bytes.buffering=0
spring.kafka.streams.properties.commit.interval.ms=100

# Custom Configuration
kafka.topic.prices=market.prices
kafka.topic.analytics=market.analytics
analytics.window.duration.seconds=60
analytics.window.grace.seconds=5

# Modernization Features
spring.threads.virtual.enabled=true
logging.structured.format.console=logstash
management.tracing.sampling.probability=1.0
