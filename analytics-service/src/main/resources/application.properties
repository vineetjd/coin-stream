spring.application.name=analytics-service
server.port=8085
spring.kafka.bootstrap-servers=broker:29092
spring.kafka.streams.application-id=coinstream-analytics

# NOTE: the full Kafka Streams config (serdes, cache, commit interval, and the
# poison-pill deserialization handler + DLT recoverer) is owned by the
# defaultKafkaStreamsConfig bean in StreamsDlqConfig, because Boot's property
# binding silently dropped the deserialization.exception.handler key.

# Application configuration (bound to AnalyticsProperties)
analytics.prices-topic=market.prices
analytics.analytics-topic=market.analytics
analytics.window.duration=60s
analytics.window.grace=5s

# Modernization Features
spring.threads.virtual.enabled=true
logging.structured.format.console=logstash
management.tracing.sampling.probability=1.0
