spring.application.name=api-gateway
server.port=8082

spring.kafka.bootstrap-servers=broker:29092
spring.kafka.consumer.group-id=gateway-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# WebSocket
server.servlet.context-path=/

# Kafka Topics
kafka.topic.prices=market.prices
kafka.topic.analytics=market.analytics

# Modernization Features
spring.threads.virtual.enabled=true
logging.structured.format.console=logstash

# Observability: Actuator endpoints, liveness/readiness probes, Prometheus metrics.
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
# Observations feed Micrometer timers (e.g. Kafka consume metrics) into Prometheus.
spring.kafka.listener.observation-enabled=true
