server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the Gateway if needed (optional since we hit gateway directly)
    # location /api/ {
    #     proxy_pass http://api-gateway:8082;
    # }
}
