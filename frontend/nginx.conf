server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve index.html for any non-asset route
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy the SockJS/STOMP endpoint to the gateway. From the browser's
    # perspective this is same-origin (port 80), so the frontend connects to a
    # relative "/ws-market" URL with no build-time configuration and no CORS.
    location /ws-market {
        proxy_pass http://api-gateway:8082;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SockJS XHR-streaming / long-poll fallbacks hold the connection open
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}
