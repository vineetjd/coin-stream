spring.application.name=ingestion-service
server.port=8095
spring.kafka.bootstrap-servers=broker:29092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
# Reliability: no silent data loss. Idempotence implies acks=all and dedupes
# producer retries, giving exactly-once *delivery to the partition* (not E2E).
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
spring.kafka.producer.retries=3
spring.kafka.producer.properties.delivery.timeout.ms=120000

# Logging
logging.level.root=INFO
logging.level.com.coinstream=DEBUG

# Custom Configuration
kafka.topic.prices=market.prices
binance.ws.url=wss://stream.binance.com:9443/stream?streams=btcusdt@trade/ethusdt@trade/solusdt@trade
binance.ws.reconnect.delay.seconds=5

# Modernization Features
spring.threads.virtual.enabled=true
logging.structured.format.console=logstash
management.tracing.sampling.probability=1.0
