services:
  broker:
    image: confluentinc/cp-kafka:7.5.0
    hostname: broker
    container_name: broker
    ports:
      - "29092:29092"
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker:29093'
      KAFKA_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://broker:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx400m -Xms400m"
      # Generate a Cluster ID on startup (required for KRaft)
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server broker:29092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    depends_on:
      - broker
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker:29092

  ingestion-service:
    build: ./ingestion-service
    container_name: ingestion-service
    depends_on:
      broker:
        condition: service_healthy
    restart: on-failure
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: broker:29092
      SERVER_PORT: 8095
      JAVA_TOOL_OPTIONS: "-Xmx256m"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8095/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    depends_on:
      broker:
        condition: service_healthy
    restart: on-failure
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: broker:29092
      SERVER_PORT: 8085
      JAVA_TOOL_OPTIONS: "-Xmx256m"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8085/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    depends_on:
      broker:
        condition: service_healthy
    restart: on-failure
    ports:
      - "8082:8082"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: broker:29092
      SERVER_PORT: 8082
      JAVA_TOOL_OPTIONS: "-Xmx256m"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # --- Observability stack (opt-in): docker compose --profile observability up ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    profiles: [observability]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - ingestion-service
      - analytics-service
      - api-gateway

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    profiles: [observability]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
